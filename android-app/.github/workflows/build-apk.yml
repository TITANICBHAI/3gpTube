name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.2.9519653" "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: android-app
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android-app/app/build/outputs/apk/debug/app-debug.apk artifacts/YouTubeConverter-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeConverter-APK
          path: artifacts/YouTubeConverter-debug.apk
          retention-days: 30

      - name: Build info
        run: |
          echo "================================"
          echo "Build completed!"
          echo "APK: YouTubeConverter-debug.apk"
          echo "================================"
