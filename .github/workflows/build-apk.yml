name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies for Chaquopy
        run: pip install yt-dlp requests

      - name: Download Gradle wrapper JAR
        working-directory: android-app
        run: |
          mkdir -p gradle/wrapper
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed 's/.*gradle-\([0-9.]*\)-.*/\1/')
          echo "Detected Gradle version: $GRADLE_VERSION"
          curl -fsSL -o /tmp/gradle-dist.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -j /tmp/gradle-dist.zip "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-*.jar" -d /tmp/wrapper_extract/ 2>/dev/null || \
          unzip -j /tmp/gradle-dist.zip "*/gradle-wrapper-*.jar" -d /tmp/wrapper_extract/ 2>/dev/null || true
          if ls /tmp/wrapper_extract/*.jar 2>/dev/null; then
            cp /tmp/wrapper_extract/*.jar gradle/wrapper/gradle-wrapper.jar
          else
            unzip -j /tmp/gradle-dist.zip "gradle-${GRADLE_VERSION}/lib/gradle-wrapper-*.jar" -d /tmp/wrapper_extract2/ 2>/dev/null || true
            unzip /tmp/gradle-dist.zip -d /tmp/gradle_full/ 2>/dev/null
            find /tmp/gradle_full -name "gradle-wrapper.jar" | head -1 | xargs -I{} cp {} gradle/wrapper/gradle-wrapper.jar
          fi
          ls -lh gradle/wrapper/
          java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain --version 2>/dev/null || echo "JAR validation skipped (expected — needs network for first run)"

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: List APK output
        run: find android-app -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeConverter-Debug-APK
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: android-app
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
        continue-on-error: true

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeConverter-Release-APK
          path: android-app/app/build/outputs/apk/release/*.apk
          retention-days: 30
        continue-on-error: true
